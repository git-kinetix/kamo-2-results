<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>HumanVid Val — 720p drop22</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0f1115;
    --panel: #161a22;
    --border: #262c38;
    --text: #e6e8ec;
    --muted: #8a93a3;
    --accent: #4f8cff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(15,17,21,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .progress { color: var(--muted); font-size: 14px; }
  header .progress strong { color: var(--text); }
  header nav { display: flex; gap: 8px; }
  header nav a {
    color: var(--muted); text-decoration: none;
    font-size: 13px; padding: 6px 12px; border-radius: 6px;
    border: 1px solid var(--border);
  }
  header nav a:hover { color: var(--text); border-color: var(--accent); }
  header nav a.current { color: var(--text); background: var(--accent); border-color: var(--accent); }
  header button {
    background: var(--accent); color: white; border: none;
    padding: 8px 14px; font-size: 13px; border-radius: 6px;
    cursor: pointer; font-weight: 500;
  }
  header button:hover { filter: brightness(1.1); }
  header .status { color: var(--muted); font-size: 12px; margin-left: auto; }
  main {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    max-width: 100%;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .card .label {
    padding: 10px 14px;
    font-size: 13px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    word-break: break-all;
  }
  .card .label strong { color: var(--text); }
  .card video {
    width: 100%;
    display: block;
    background: black;
    cursor: pointer;
  }
  .empty { color: var(--muted); padding: 60px; text-align: center; grid-column: 1 / -1; }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <h1>HumanVid Val — 720p drop22</h1>
  <nav>
    <a href="./" class="current">720p drop22</a>
    <a href="./native_480p/">native 480p</a>
    <a href="./depth_inferences/">depth reproj</a>
  </nav>
  <div class="progress"><strong id="count">0</strong> / 210 samples</div>
  <button id="refresh">Refresh</button>
  <div class="status" id="status">never refreshed</div>
</header>
<main id="grid">
  <div class="empty">Loading manifest...</div>
</main>

<script>
// S3 base URL for this page's videos. Subpages override BASE.
const BASE = "https://kamo2-retraining-public.s3.eu-west-1.amazonaws.com/humanvid_val_inferences/";
// Strip a trailing _grid_2x2.mp4 (or .mp4) suffix to display the sample id only.
const ID_RE = /_(720p_steps\d+_drop\d+_ref-[^_]+_)?grid_2x2\.mp4$/;

const grid = document.getElementById('grid');
const countEl = document.getElementById('count');
const statusEl = document.getElementById('status');
const refreshBtn = document.getElementById('refresh');

let observer = new IntersectionObserver((entries) => {
  for (const e of entries) {
    const v = e.target;
    if (e.isIntersecting) {
      v.play().catch(() => {});
    } else {
      v.pause();
    }
  }
}, { threshold: 0.3 });

// Some browsers (Safari, Chrome without prior page-engagement) block
// programmatic .play() until the user has interacted with the document.
// Listen once for any user gesture, then force-play every visible video.
let autoplayUnlocked = false;
function unlockAutoplay() {
  if (autoplayUnlocked) return;
  autoplayUnlocked = true;
  for (const v of document.querySelectorAll('video')) {
    v.play().catch(() => {});
  }
}
['pointerdown', 'touchstart', 'keydown', 'wheel', 'scroll'].forEach(evt => {
  window.addEventListener(evt, unlockAutoplay, { once: true, passive: true });
});

function sampleIdFromFile(name) {
  return name.replace(ID_RE, '').replace(/\.mp4$/, '');
}

function videoUrl(name) {
  // S3 keys with '+' must be percent-encoded; encodeURIComponent handles all unsafe chars.
  // We split on '/' so any path segments stay as separators.
  return BASE + name.split('/').map(encodeURIComponent).join('/');
}

async function loadManifest() {
  statusEl.textContent = 'refreshing...';
  try {
    const res = await fetch(BASE + 'manifest.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const files = await res.json();
    files.sort();
    countEl.textContent = files.length;
    render(files);
    statusEl.textContent = 'updated ' + new Date().toLocaleTimeString();
  } catch (err) {
    statusEl.textContent = 'error: ' + err.message;
    if (!grid.querySelector('.card')) {
      grid.innerHTML = '<div class="empty">No manifest yet (' + err.message + ')</div>';
    }
  }
}

function render(files) {
  const existing = {};
  for (const card of grid.querySelectorAll('.card')) {
    existing[card.dataset.file] = card;
  }
  if (files.length === 0) {
    grid.innerHTML = '<div class="empty">No videos yet.</div>';
    return;
  }
  const empty = grid.querySelector('.empty');
  if (empty) empty.remove();

  const seen = new Set();
  for (const f of files) {
    seen.add(f);
    if (existing[f]) continue;
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.file = f;
    const label = document.createElement('div');
    label.className = 'label';
    label.innerHTML = '<strong>' + sampleIdFromFile(f) + '</strong>';
    const video = document.createElement('video');
    video.src = videoUrl(f);
    video.muted = true;
    video.loop = true;
    video.playsInline = true;
    video.preload = 'auto';
    video.addEventListener('click', () => {
      if (video.requestFullscreen) video.requestFullscreen();
      else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
    });
    card.appendChild(label);
    card.appendChild(video);
    grid.appendChild(card);
    observer.observe(video);
  }
  for (const [f, card] of Object.entries(existing)) {
    if (!seen.has(f)) {
      const v = card.querySelector('video');
      if (v) observer.unobserve(v);
      card.remove();
    }
  }
}

refreshBtn.addEventListener('click', loadManifest);
loadManifest();
setInterval(loadManifest, 60000);
</script>
</body>
</html>
